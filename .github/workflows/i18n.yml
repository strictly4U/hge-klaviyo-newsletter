name: Generate .pot

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.php'
      - '.github/workflows/i18n.yml'
  workflow_dispatch:

jobs:
  pot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli

      - name: Generate .pot via wp-cli i18n make-pot
        run: |
          wp i18n make-pot . languages/hge-klaviyo-newsletter.pot \
            --slug=hge-klaviyo-newsletter \
            --domain=hge-klaviyo-newsletter \
            --skip-audit

      - name: Strip POT-Creation-Date for determinism
        run: |
          # wp-cli writes a fresh timestamp on every run; remove it so the file
          # only changes when actual source strings change (matches the output
          # of bin/extract-pot.py and keeps the "no commit if unchanged" guard
          # below working as intended).
          sed -i '/^"POT-Creation-Date:/d' languages/hge-klaviyo-newsletter.pot

      - name: Commit + push regenerated .pot if changed
        run: |
          if git diff --quiet languages/hge-klaviyo-newsletter.pot; then
            echo "No change in .pot — skipping commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add languages/hge-klaviyo-newsletter.pot
            git commit -m "i18n: regenerate .pot (auto)"
            git push
          fi
